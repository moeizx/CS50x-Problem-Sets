<!DOCTYPE html>

<html lang="en">
    <head>
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500&display=swap" rel="stylesheet">
        <link href="styles.css" rel="stylesheet">
        <title>Trivia!</title>
        <script>
            document.addEventListener('DOMContentLoaded',function(){
                let correct=document.querySelector('#saturn');
                let incorrect=document.querySelectorAll('#earth, #mars, #venus');

                correct.addEventListener('click',function(){
                    correct.style.backgroundColor='green';
                    document.querySelector('#feedback1').innerHTML="Correct!";
                });

                incorrect.forEach(function(button){
                    button.addEventListener('click',function(){
                        button.style.backgroundColor='red';
                        document.querySelector('#feedback1').innerHTML="Incorrect!";
                    });
                });

                let check = document.querySelector('#check');
                check.addEventListener('click',function(){
                    let input = document.querySelector('#input');
                    let result = document.querySelector('#feedback2');
                    if(input.value.toLowerCase()==="cs50"){
                        input.style.backgroundColor='green';
                        result.innerHTML="Correct!";
                    }
                    else{
                        input.style.backgroundColor='red';
                        result.innerHTML="Incorrect!";
                    }
                });
            });


        </script>
    </head>
    <body>
        <div class="header">
            <h1>Trivia!</h1>
        </div>

        <div class="container">
            <div class="section">
                <h2>Part 1: Multiple Choice </h2>
                <hr>
                <h3>Which planet in our solar system is known for having the most extensive ring system?</h3>
                <button id="earth">Earth</button>
                <button id="mars">Mars</button>
                <button id="saturn">Saturn</button>
                <button id="venus">Venus</button>
                <p id="feedback1"></p>
            </div>

            <div class="section">
                <h2>Part 2: Free Response</h2>
                <hr>
                <h3>What is the best Computer Science course in the world?</h3>
                <input type="text" id="input">
                <button id="check">Check Answer</button>
                <p id="feedback2"></p>
            </div>
        </div>
    </body>
</html>
